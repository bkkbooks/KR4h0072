  text: 谷音下
  hash: sha256:35c7e01597ba5a67a05b7ba7868fa854ad93ddd482c1fea4841020d80649c3ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0072_SBCK_002-1a}
body:
  text: 建安詹本道生三首本溫言正行丞相江萬里薦為郎先致書本夲方坐門前石上釣使者至問本居本曰前即持竿渡溪去不知所終春日携客遊武夷山腳健枝梧百里插蒼峭𥻘𥻘石可把曙色坐逺釣風水真笙竽歷落太古調衣冠帶莽蒼山鬼驚二妙雲月正忘年花鳥更索笑回船翠凌亂吾道付長嘯間中萬事問不知山中一樽酒掃石坐松風緑隂滿中䄂宿天台風泉隔西屋獨夜寒白生開窗失山色白雲壓前楹纍盡得瀟灑去住俱不驚鼻息答僧鐘霜露入殘更四明皇甫明子東生三首明子性豪宕乘小舟挂布帆載琴尊書籍釣具往來江湖至元丙子發狂痛哭蹈海水國水國凄凉住秋宵爛熳眠歸雲猶帶雨墮月忽明船社稷資長算髭鬚近暮年亂離栖不定百口托浮田海口窮島迷孤青颶風蕩頑寒不知是海口萬里空波瀾蛟龍恃幽沉怒氣雄屈蟠峥嶸抉秋隂挂席潮如山熒惑表南紀天去何時還雲旗光慘淡腰下青琅玕誰能居甬東一死諒非難嗚呼朝宗意㑹見桑土乾京口行京口兵可用酒可飲一語參差族成血忠賊相持各凛凛豈知好醜隔形骸父為孔鵉子為鴆人衆天定理則那遺臭流芳且高枕長沙丁開復見四首開負氣敢言安撫向士璧𬒳問開獨詣闕上疏具陳士璧功大軍府小費不宜推䆒書奏羈𬋩揚州歲餘卒可惜日者今何及天乎有不平功高人共嫉事定我當烹父老俱嗚咽天王夲聖明不愁惟黨禍携淚向孤城漂泊嶽陽遇張中行因泛舟洞庭晚宿君山聮句元氣無根株丁地脉有斷絶張日月互吞吐丁雲霧自生滅張楚妃結幽想丁巴客答青咉張寧知蒼莽中不假巨鼇力勢閲南紀浮丁思隨西風發形影寄孤舟張吾道成鵙舌笑談正凌傲丁俯仰不逼側每與景物㑹張未省歡娛畢疊翆晚愔愔丁墮黃秋的的魚龍負屭贔張獨鳥去不息曠原抱眇周抱丁異境超慌惚徑度萬頃空張忽得一拳碧稍稍雞犬近丁依依鐘梵夕推門月微墮張煮茗𥘉香歇衣裳識霜信丁瓶鉢了禪悅事定心源清張夢回斗柄植周游興欲盡丁長往計未决出門更回首張沙水蕩虛白美哉神禹功丁已矣三苗國山川長不朽張愚知俱可惜神交正冥冥丁指點空歷歷慎勿語俗人張桃源恐相失丁建業誰遣凄凉滿眼中蘋花渺渺又秋風龍蹲虎踞江山大馬去牛來社稷空縱有千人惟諾諾本無百歲更匆匆乾坤顛倒孤舟在聊復殘生伴釣翁揚州歲暮萬國春回日層城晚眺餘江聲隔吳楚原色到邳徐大閲軍容壯狂歌客禮踈百年寒荻裡風雨憶吾廬括蒼鮑輗以行七首輗嗜酒授簡萬言教授得錢悉送酒家遇客盡飲乃去晚益傲誕衲衣髽結游青城不返襄陽行今日何日天氣柔東城騎馬花綢繆為君停馬一呼酒花前倒披紫綺裘玉脂泛濫魚鳥飫歌舞倦矣蛾眉愁千金萬夀好賔主今我不樂歲如流豈比世上狂馳子一語不合行掉頭嗚呼天倫古所定非有大故寧相尤天馬天馬抱竒相緊骨瞳方明出入百萬中有如一鳥䡖宇宙莽超踏風雲慘經營獨倚雄傑態蕭蕭隨北征朝飲南海頭夕秣乃幽并失主坐黯淡别群奮長鳴豈無䡖俠兒金羈懸朱纓但感束帛義不忍負死生低頭為君老喑喑萬里情重到錢唐生死㕠飛正可憐若為白髮上征船未應分手江南去更有春光七十年無賴山光疊疊清玉魚金碗早飄零冷思禹穴真竒事千古衣冠托杳冥萬家歌舞送浮生曽有㳙埃答太平猿鶴沙蟲天始定不須辛苦怨南征聞道深春雪打圍誰憐身上藕絲衣莫憂白璧成塵土解逐南風萬里歸惟有寒潮不世情朝朝暮暮過空城百年車馬閶門外獨獨春風草又生京口崔璆子玉三首璆美風儀善談論晚病狂携大瓢貯酒行市拍掌歌笑未死十日自表石題曰醉鄉伯崔璆之墓携戣鉞泛江酒星落京口化為崔子玉孤舟載壺觴水花紅映肉小兒唱銅斗大兒倒􅙩醁一笑不知年浩蕩天地屋慎勿臨竇呼人生隨轉燭嗣宗禮法仇鍾㑹𬒳殺戮咄咄咄咄復咄咄小兒成老翁么微各形色追琢元化工不知春風去又見千緑叢主人美客懷載酒行溪東一步一回首十步樽已空靈均與太白醒醉同所終願見化蠛蠓生死托壺中今日一何好今日一何好花下醉狼藉醉中有竒事夢見生八翼浩蕩排虗空靈君好顔色朱衣持大篆授我醉卿伯頓首玉墀下臣璆才蟣蝨封此抑何功請陳愚頑臆臣家京口東門前大江碧臣願駕長風吹作酒萬石萬象各千鍾拍拍大庭國推枕在山中𥿄衾霜曉月姑熟魚潛德昭五首潛敦重和易推分淡泊不忤于物所居環堵掃地㷊香彈琴讀書飬鵝鴨百頭以給食終八十餘楊白花楊白花誰教度簾幕搖蕩春風能幾何不比無情自漂泊人生祗合作支離長秋鴉啼江水落古意青青陵上柏落落勁不摧人生百年內朝夕變所懷斗酒命同好萬里不顧回聞有昌國君談笑黃金臺柔言更長跪信是富貴媒但恐氣習移古今不同才寄言去國者歲晚有餘哀權衡豈公平天駟但伏櫪東井不救渴倉庫何時實元工肻假借名器甚可惜如何萬萬古不行督責術送鄭祕書南歸垂老乃如此􅑀髙俱惘然空能正幾字好去作千年童子歌鴝鵒幽人拜杜䳌江南獨爛熳春去得誰憐聞歌流雲行水出名姝酒盡花前㕠玉壺此曲江南都忘却春風轉調小單于瑞陽柯芝士先三首芝早通五經善詞賦又詣行在所見章祕書求讀書省中益通諸家教授生徒著書百餘卷子茂謙餘髮餘髮蕭蕭白垂領十年一拙門庭冷來頻沙鳥頗相識起晚憐雞已三請形骸拄樹豈復好心緒如蓬不能整平生幾緉空馺􅤥老去一杯先酩酊俗言祗虞方鑿忤人事但愜幽居屏聖賢未必盡芻狗天地何堪共蛙黽若為苴履曾足芥幸不柳衫真欲癭一聲樵響何處來獨立看雲發深省耳耳耳耳非佳語陸陸難為顔我生胡不淑多戚長鮮歡搖落復已緑春風滿清干最靈起豫興欲言骨肉酸園桑摧為薪桃李亦半殘翹嶤企晴燠九室十更寒飛錢如美色乃入貴者闌丘閭有穀賣窮櫩朝無饘不售信蹙隱徒手良抱歎宛轉愒餘息溝壑分寸間吾輩正不免遑暇恤彼􅘃橫江橫江一片碧携隺上漁船收綸不成下却抱釣竿眠茂謙退子二首江行早發陶鐺煮孤影寒燈沸青花氷開數江樹月落失人家魯港十年回首付霑襟斷甲沉沙齒齒深可惜使船如使馬不聞聲鼓但聲金人歌鬼哭都堪史木落江空正獨吟遺老蕭條漸無語酒旗颭颭出蘆林廬陵卲定中立二首定溫粹博雅通周易春秋宅邊植梅竹蘭桂蓮菊各十餘夲深衣大帶婆娑其間自稱六薌老人山中白日看雲坐清秋對雨眠眉頭無一事筆下有千年漁家漁家臨水住春盡無花開年年謝流水流得好花來豫章㷱與和天樂二首與和性介淡無妻不食肉通經史百事之書布衣草屨遨逰名山尤嗜彈琴草書唐玄宗鐵像巍冠攢疊碧雲花坐閲山中幾歲華莫把金丹䡖點化正愁生死困安家木平飼龍亭次韻方巨山耳見何如得眼聞山根磅礴極𥘉分浮漚起滅自潭影大地晴隂空嶺雲何處老人來聼講他年少府有移文由來清調須吾輩幸不山王愧五君宜春宴乂明粲二首乂明風度秀整主趙崇澭後澭逮繫乂明自請詣獄俱以疾終訪吳平生一語不肯吐浩然披髮行西休美人十日跨驢出黃葉堆門雲雪深夢中春樹年年少寒雲浦浦連片帆高浪起斗酒夕陽偏沙市懷司馬州城哭老邉太平冠蓋盡爾敢望諸賢大庾孫璉器之二首璉家貧益嗜書不應選舉躬耕織屨以食終百歲述懷少也不諧俗老去益美間百草生已緑春雨滿南山朝朝荷鋤去既夕驅牛還生長苑簷下貧賤甚獨安但願桑麻長優遊足歲年坐倦秋樹根攝衣步前丘橫河淡如練破月西南流獨持一尊酒悠然發清謳俯仰無不足吾生焉所求臨江楊應發幼平二首應發寬厚長者有德行言辭七試國子不第退就耕牧老于南塘孫雯水宿水宿逄今雨春歸及故園聖朝臣已老往事客何言乞米分鄰里看書到子孫蒼茫不可㑹一笑了清樽寄趙梅州江城鴈呌天如水寒色蒼蒼草木死哀歌未斷月東出有才無命可流涕今我不樂思梅州束帶深衣百僚底天下規矩見卓絶龍章麟角諸公子白頭持莭得蠻府歸來閉門呼不起惆悵平生狗馬病風后力牧長已矣為公問酒日日酤熏天富貴憂患始雯天章五首迢遙空同山迢迢空同山乃在西極巔玉泉䕃靈芝上有千歲仙安得凌風翼相從白雲間神仙本冥漠天運仍推遷不如酌我酒或得成自然田父要我語飲者亦非賢願君長獨醒加餐足高年宋武帝廟溪聲答松風巨石出老拳古樹不知名岌岌蛟龍纏夕隂互出沒秋華帶芳鮮葱葱帝王氣棟宇垂千年虎賁秉霜㦸慘淡生雲煙宫人翠龍駕手持玉連蜷昌明坐慌惚精神靁在天大呼司雍間旬月無秦燕昔為萬大特今受衆目憐石馬亦埋沒歲時草芊芊小臣異代士見之淚迸泉齊人思爽鳩蜀人哀杜鵑江東舊正朔禮奉敢不䖍但碩君王心不忘載荻船下山又再拜白日當空懸宿峽市人煙正搖落樓笛頗清圓老樹依山驛東風上峽船江湖萬里外燈火十年前世路能令老吾生且醉眠北客北客相催發一日舉千帆遙憐庾開府歲晚望江南早春不知何處碧雲鄉冉冉平生可斷腸怪底乾坤惟理在老來歲月更心長城頭急鼓千家夢江上殘梅一水香自作醉候開醉國笑人奔走為誰狂旴江曽童子徹一首鮑輗過旴江遇一童子睂目踈朗語必援古今驚問逆旅主人子也明年載訪之死矣得其詩一首于其同舍生九齡行我生九齡氣食牛喑嗚頓挫無匹儔白雲無根起天末一身萬事同悠悠低頭拱手事先覺談笑未了成仇讎一譽不足勝百毁言語起滅如浮漚聖賢可與知者道麟鳯豈在山中遊蘧然夢覺大槐國江花昨夜生凉秋無名氏番陽布衣有書中山驛云回首萬里歲晚何言云云番陽布衣題回頭四十五年非無賴秋光滿客衣可惜吳中􅐜菜好陸機張翰不同歸瀟湘漁父一首崔璆晚泊湘江淡烟微月有客歌而過之追問居與名置其釣竿長嘯而去高枕形骸外空江何限情落葉不成調半夜起秋聲古碑文一首揭大中云或漁于潭得片石字十數行率磨沒僅識得二十八字意幽人憤士之作不合于時故沉之以俟知者乾淳老人氣嶽嶽破冠穿履行帶索撑腸拄肚書萬卷臨風欲言牙齒落閩清野人一首僧惠了行閩清谷中三日到一空舍稍憩有一人荷鋤來便向壁􅌻睡僧既尋路還它日再往已㷊其舍惟斫樹白而書云偶與雲水㑹不與雲水同雲散水流去杳然天地空羅浮狂客趙孟柔云柔録事惠州聞羅浮道士言咸淳中客有戴烏帽著靴往來山中見人輒大笑反走三年不言姓名它日醉歸忽取煤書壁上云云長揖度海去雲意不知滄海春光欲上翠微人間一墮千劫猶愛梅花未歸谷音下終
