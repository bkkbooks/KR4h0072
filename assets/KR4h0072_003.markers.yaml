  - {type: variant, offset: 349, length: 2, content: 睦記, WYG: 靡獨數子者心懸萬里之外九霄之上或上書或浮海或仗劍沉淵悲歌慷慨令人讀其詩想其人有齊二客魯兩生之思焉不然紀逡唐林之節非不苦韋莊和凝之詩非不韻一失身於新莽偽屬之朝恐未免為後世嗤笑資于伯原斯編意有不得其平復有不忍鳴者聊借他人章句竊比靖節不書甲子之遺意歟湖南毛晉識}
