  - {type: variant, offset: 337, length: 1, content: 行, WYG: 孤往風標翛然雲上急覔本傳讀之累徴不赴隠㢘於武夷九曲間殆古之栖逸者流而以翰墨自放者也正謂其四經表義諸書湮没罕見扼腕久之月在從呉門來携得谷音二巻乃伯原所集宋末逸民詩也凡二十有九人各有小傳紀其大略共詩百篇諸體}
  - {type: variant, offset: 339, length: 9, content: 見元史隱逸傳中丙午, WYG: 備韓昌黎云其歌也有思其哭也有懐凡出乎口而為聲者其皆有弗平者乎宋室既傾詩品}
