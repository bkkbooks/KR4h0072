body:
  text: 右詩一卷凡二十三人無名者四人共一百首乃宋亡元𥘉莭士悲憤幽人清詠之辭京兆先生早遊江湖得於見聞悉能成誦因録為一編題曰谷音若曰山谷之音如野史之類也刋于平川懷友軒以傳于世今歷兵燹板已不存豫幸藏此夲風晨月夕寂寥之中每一歌之則想像其人而愧不能倣佛其萬一也未嘗不慨然久之今年先生之孫德基來從豫暇時輒出此編俾録而歸之曰是爾祖手訂之文且諸人小録皆其自述言簡而偹是亦家傳之舊子能誦而思之亦繼紹之一端未可以為小書而忽之也因嘗論之時危世變臨難不避與夫長往自潔者不為不少惜不盡傳于世也如是編數人茍非先生記其詩而傳之則泯沒無聞矣然則誦其詩者非獨取其雄渾沖淡而其心術之正出處之大可概見矣德基其廣傳之母為篋笥故𥿄云戊午重九日蜀郡張矩書此詩豫得之建安楊中舍仕警觀張矩跋謂為京兆先生編京兆先生者杜徴君夲字伯原其行具見元史隱逸傳中丙午都睦記
