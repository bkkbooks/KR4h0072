body:
  text: 右詩一卷凢二十三人無名者四人共一百首乃宋亾元𥘉莭士悲憤幽人清詠之辭京兆先生早游江湖得於見聞悉能成誦因録為一編題曰谷音若曰山谷之音如野史之類也刋扵平川懐友軒以傳扵世今歷兵燹板已不存予幸蔵此夲風晨月夕寂寥之中毎一歌之則想像其人而愧不能彷彿其萬一也未嘗不慨然乆之今年先生之孫徳基來従予暇時輙岀此編俾録而歸之曰是爾祖手訂之文且諸人小録皆其自述言簡而偹是亦家傳之舊子能誦而思之亦繼紹之一端未可以為小書而忽之也因嘗論之時危世變臨難不避與夫長徃自潔者不為不少惜不盡傳扵世也如是編数人茍非先生記其詩而傳之則冺沒無聞矣然則誦其詩者非獨取其雄渾冲澹而其心術之正出處之大可㮣見矣徳基其廣傳之母為箧笥故𥿄云戊午重九日蜀郡張榘書此詩予得之建安楊中舎仕儆觀張榘䟦謂為京兆先生編京兆先生者杜徴君夲字伯原其行具見元史隱逸傳中丙午都睦記
