body:
  text: 遼東王澮玄佐澮博學醇行博州刺史迎為師教授弟子百餘真祐中就拜宣撫遼東宰相纍書請澮之鎮澮不應浮海遁去河之坊河之坊矣截截其平豈曰不力言持其盈國既覆矣視爾瞢瞢云胡昊天不終惠我生云胡昊天疾威堂堂輾轉玩日四國卒荒偃仰在位不知匪臧不顧其行有粟有粟亦集于缶則不敢饘抑糊余口誶曰哲矣孰秉其咎知我懮懮不知我疚陟彼南山石其扁矣戒爾勿傷足其趼矣􅊱􅊱吻吻顔之靦矣猗余何言涕之泫矣民之種種具曰贅疣弗于爾躬曷云能瘳朂哉夫子保爾有位慎爾為猶感遇迅景走北陸高木交朔風衆情恱妖冶豈云惠其終萬事無不有流轉大化中古來論成敗咄咄魚為龍牛車竄下國勢異情則同蒲姚本狙擊桓桓湯武功彼美二三子一笑清酤空兩虎鬪中野利乃歸衡虞血肉相蹂躪鼓吹行通衢獨倚剛膂力箕踞傾百壺未必非禍福凡百持爾軀吾聞虎畏羆吹竹不枝梧光風蕩繁囿丹緑綴柔柯遊子去萬里空閨斂翠蛾行雲落江水酒盡不成歌雞飛與狗走妾命獨奈何稿梧蒙􅌧冕峥嶸化侯王􅊡餌先百牢蘭煙浮玉房兒女何所見拜跪色甚莊四海正聾瞽威靈爾翕張哀哉杞梓材棄捐官道傍贈假十相識風塵下斯文伯仲間騎驢逢聖日捫蝨對秋山忠信偏成拙支離最得間秦川貴公子早計適荆蠻洛陽程自修忘吾七首自修性孝友讀書城東門翰林元祐之上其言行除禮部郎中自修聞之棄家南去歸龍門來往空書札行藏但布衣直為知已用可惜轉頭非歲月百憂集江山一笑歸禰生狂到死君子要知機出城束帶供人事扶藜強病身誅求非上意盜賊夲良民􅊜翠山藏雨輕黃栁帶春小兒隨白首行坐各霑巾獨坐終南在吾目秋色逺接應誰招天外翠來作窗中靚娟娟𥘉畫眉盈盈獨臨鏡雲去物象空月出心源印我欲往從之有客誇捷徑洗耳復洗耳松風入清聼痛哭日射石虬鱗甲開草色又換青春回精靈聚散豈拘束山鬼呌呼松柏哀當時沸天簫鼓動今日悲風陵上來匆匆今古成傳舍人生有情淚如把乾坤誤落腐儒手但遣空言當汗馬西晉風流絶可愁悵望千秋共瀟灑歲云暮矣歲云暮矣百工休獨持千古供索遊丈夫礌落如天日促促胡為升斗謀望塵下拜乃東市山中茹芝可白頭嗚呼此道棄如土眼中厯厯聖賢蠧鄉里小兒紇那歌前輩先生八風舞欲挽東流無萬牛抱膝長吟聼更雨送元吉歸河東獨憐風格困塵埃敢料天涯共酒杯花鳥偏于前輩好江山更有後人哀顔回盜跖終歸命諸葛曹丕豈論才正自别離愁未透更教柳色帶青來王猛墓男兒有才須有識死葬蠻夷真可惜君不見渴虎不飲盜泉水始吾虞君今已矣琅琊冉琇溫季六首琇好縱橫談業漁獵世為李氏客難且作琇纍書止之不聼乃南走渡江聞璮滅東鄊三哭伏劔蓬萊閣倚闌吟不就看劔老相催鳥逐孤雲沒帆從别國回魯連惟有死王粲不勝哀為問依依栁秋聲何處來遄臺遊目遄臺上煙色秋曖曃當時駐文輿君臣良宴會歌鍾正喧喧華纓接飛蓋行樂遽未央已見顔色改爽鳩焉可知齊景尚何在世運如日月朝夕還相代海州波濤起天末舟楫滿城隅管晏非王佐田韓有霸圖何門堪趿履吾道欲乘桴倚杖春風近含愁向緑蕪宿京口推蓬在京口山色對秋眠搔首半帆落懷人孤月懸形骸成獨往風物共流年隨處逃名姓烏啼又發船秦吉了有鳥秦吉了鳴聲一何悲自言承主恩十載供提携雕籠閉羽翼繫之雙華緌一朝不終惠零落投荒夷自傷去漢土豈不懷南枝誠堪利主家生死不敢辭努力萬里風寄此長相思獨立獨立春將晚周遊道正窮江山千古後形影百年中士論元無的人生各有終臨危負知已淚落海雲東河東元吉文中五首吉太原大俠人也報仇市上吏來捕更殺吏走太行谷中會以赦歸乃絶嘗與遊者三年通左氏史記家益貧至元甲子從戍開平道卒上黨怒山出老掌拳寒色頑屭贔城根插沙水斗絶虎相視惜憶昔宣武兵最疆合圍步驟如扼吭那知一叱立破散進通亞子口尚黃嗚呼皇天肯悔禍豈有盜賊稱天王要留千古論曲直故壘依稀榆葉赤自葫蘆河至居庸關男兒不成名命也負羈絏投𬒮出門去浩蕩破邊色飛沙白蕩胞落葉黃沒膝微陽割層暝山骨緊格格抉眼已峥嶸置身何突兀健雕勢欲落老馬智亦屈氣岸勇枝梧脈絡大包括物候秋冬交土風夷夏隔懷歸畏簡書欲往投鬼蜮無言答酸楚有血灑寥閴古來喪亂中天地坐局蹐形骸盡則已烈士要馬革陪翟三遊平州東城老境逢春色平州聚德星不堪歌敕勒并欲案丁零雪泥殘年白山呈太古青殊方更分手暮角若為聼早發博州落落空城在蕭蕭獨客歸古今殊未了心迹每相違魏國山河美唐家節度非偷生慚宿鳥霜月上征衣夜坐森森夜氣落寒櫩間把離騷酒正酣忽憶梅花不成語夢中風雪在江南曲阜孟鯁介甫四首鯁沈毅雄略中統癸亥山東兵欲起劫鯁計事甲者三至鯁不肯遂𬒳害徐州徐州壓城霜木赭可能回首風塵下當年縞素從西來仰天伏地聲鳴啞君臣大義日月白牧野鳴條其亞帝王氣象佳蔥蔥舉止却類田舍翁美人瓊王是糞土四海正在水火中如龍如虎尚蹉跌况乃𥪡子貪天功南京愔愔坊陌傍深春活活河流雨過渾花鳥幾時充貢賦牛羊今日上丘原猶傳柳七工詞翰不見朱三有子孫我亦前生梁楚士獨持心事過夷門猛虎猛虎𬒳束縛皮肉不相保人生到錯忤天地亦草草古來割據何代無可憐百萬殉匹夫漁陽突騎如風火青州城門鐵作樞丈夫好在識時務座上赤龍公莫舞沙海荒荒魂不歸莫説青州淚如雨折花怨匆匆杯酒又天涯晴日墻東呌賣花可惜同生不同死却隨春色去誰家廣漢安如山汝止二首如山善擊劔左右射讀經史百氏之書端平甲午安撫曹友開辟掌書記不起友聞戰死三泉如山往收其骨藏諸其先之側乃東下老于會稽曹將軍將軍精悍姿齒齒碎鐵石在昔童稚中但聞飽經術縱橫騁柔翰丹臒間金碧有司塞明詔敝邑屈詞伯芹香春水生冠玉侍重席脫略章句陋搜抉窮理窟未及文化成其如王土窄丈夫報主願豈必蒙清秩蒼然請去位滿靣秋栗烈紏合熊虎群旌斾揚廣陌正當摩厲間一鼓拔勍敵屯兵沔水源千里斧截截浩蕩排煙旻西極安嵲屼奈何國無人腐儒秉旄鉞賞豫入私門金湯授盜賊公時奮臂爭反邅獻玉刖三軍視馬首慟哭下下天壁功成坐齟齬憤怒鬚插戟中宵拔劍起肅肅整徑翮吐氣風雲生搴旗陷堅列貫穿死生地喋血天地黑勢雖衆寡懸形未雌雄決路窮斷首尾衆盡仍手格豈知龍虎逝黯淡山川色百萬尚震驚嗚呼死諸葛長城但自壞千古痛稠結肉食無逺謀野史有直筆酒酣歌節士皛皛霜月白下瞿唐去去如奔馬來來無盡船人心似江水日夜向吳天成都王翥一飛五首翥篤學尚氣吳曦謀反來請翥翥陽風病瘖潛往安丙謀誅曦事定匿巴中為農終身送張判官歸巴州回首三巴曲平生萬里橋衣冠無賴客花月可憐宵灌口秋漲所向愁無地窮源欲上天蛟龍胡爾怒鷗鷺更誰憐萬里朝宗意群凶跋扈年生涯秋色裡獨立問漁船吳宣撫故宅社稷疲奔命乾坤服至誠扶持三蜀在出入兩朝榮豚犬有遺恨麒麟空復情家聲隤已盡國法用猶輕成季翻無後花卿浪得名門庭黃鳥語几杖緑苔生威福何偏重精神恐不平庶幾蒙世美凡百慎持盈憶舍弟藥物吾仍病花時汝未歸不眠愁月落獨立看雲飛詩禮自持律飢寒誰解圍遙知理舟楫西望涕霑衣浮世浮世惟高抌平生有弊裘江花中酒日巴雨落帆秋老矣英雄事愚哉盜賊謀啼猿自在一笑下滄洲襄陽師嚴道立嚴讀書識大義善槊射自圍中拔身走行在所上書論事不報拂衣去客死武陵渡江鹿門山人滄浪客灑淚已枯眼見骨風塵峥嶸萬里空不知何處營三窟城中性命湯火近路窮援斷無消息鼠竊狗偷何足憂都將十指謾天日大言濶步好公卿三百年餘涵飬成已聞鄭五但搔首復近龎涓𥪡子名平時肉食誇果決誰信臨危跋疐行白頭面皺牙齒落萬事已矣秋風生大閲長江天設險荆州國門西幕前杖斧鉞赫赫齊晉尊熊羆在掌握百万下敢喧固列崖嶠立動色虹霓翻雖云口口口亦是明主恩髙秋鼓角壯慘淡傷精魂山南正困厄血肉連川原由采多壘辱豈不在大藩既同事王室於義如弟晜朂哉從簡書恤鄰古所敦藺五見訪漢隂美人青兕裘獨騎瘦馬尋荒丘花前下馬迎一笑珠玉在側形骸羞酒酣散髮箕踞坐錦帶爛熳懸吳鈎斷蛟刺虎好身手碧曈如水涵清秋惜哉科目太脫略壯士豈為章句囚中原格鬪困不已江波木落寒悠悠庚午三月五日朱尚書席上醉歌天風浩蕩何處來荆南府中好春酒我公此日盛賓佐但飲母勞問升斗座中十萬無下筯烏帽朱衣馬牛走妙舞清歌如有神翠爛金明各回首人生行樂須壯年小人再拜為主夀滿堂淚落起挽鬚臨饋三難成鬱紆干戈未定郡國破亂臣賊子何代無主憂臣辱坐感激忍對花鳥調歡娛近聞士卒願一戰猛氣正倚風塵粗丈夫行事動千古快意一飽非雄圖武陵客居浩蕩千年調飢寒八尺身不愁􅑮魍魎可笑繫麒麟殘雪江村路空山澗水春時危終逺去道在豈全貧公安早發去國秦公子窮途阮步兵别離如昨日豪俠異平生江月為誰好巴船何處行高秋伴搖落早發若為情廣陵張琰汝玉琰身七尺長鬛倜儻有莭概輔州牙兵隨制置李庭芝潰圍南赴行在所追者及之麾下鳥獸散琰獨鬪死出塞曲腰間插雄劍中夜龍虎吼平明登前途萬里不回首男兒當野死豈為印如斗忠誠表壯莭燦爛千古後朝發山陽去暮宿清水頭上馬左右射捷下如獼猴先發服勇決手提血髑髏兵家互勝負凡百慎前籌驅馬飲淮水千里黃草平種榖却流血痛哭秋風生寡妻出租稅孤兒荷戈行武威既不足願見和親成軍中日奏凱鼓行遼海東當寧怡玉色千金勞成功焉知昨日地組甲去如空邊人不敢語將軍益褒崇官栁不見橋東黃布簾樹猶如此我何堪裊裊亭亭忒無賴又將春色誤江南漢陽汪涯萬頃三首涯家貧事母孝宣橅賈似道請為客當作露布獻捷涯瞋目曰啖人以利而退其師又兒㺯主上似道大怒撾殺之其母曰汝以直死我則不辱可以下報先君矣亦自沈江帆江帆去去可腸斷千古萬古越王臺掃空黃葉晚風定飛盡碧天晴鳥回半生無成坐筆硯萬事不理問樽罍年年看梅今白首已矣英雄留七哀采石獨酌欲落不落月在手百年幾何持釣綸不知春色萬象表緑煙漠漠入江薲天翻地覆有今夕酒熟詩溫無可人向來談笑成黃土墮淚未了雞司晨江行江陵白魚如斫玉挂席獨去風日寒封題兩甕寄白髮兒涯不是作魚官秋光蕩漾滿行色鄰舟吹笛不堪聞洞庭濯足一樽酒夫君不來空白雲
