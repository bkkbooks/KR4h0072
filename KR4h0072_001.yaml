body:
  text: 遼東王澮玄佐澮博學醇行博州刺史迎為師敎授弟子百餘真祐中就拜宣撫遼東宰相累書請澮之鎮澮不應浮海遯去河之坊河之坊矣截截其平豈曰不力言持其盈國既覆矣視爾瞢瞢云胡昊天不終恵我生云胡昊天疾威堂堂輾轉翫日四國卒荒偃仰在位不知匪臧不顧其行有粟有粟亦集于缶則不敢饘抑餬余口誶曰哲矣孰秉其咎知我懮懮不知我疚陟彼南山石其扁矣戒爾勿傷足其趼矣􅊱􅊱㖧㖧顔之靦矣猗余何言涕之泫矣民之種種具曰贅疣弗于爾躬曷云䏻瘳朂哉夫子保爾有位慎爾為猶感遇迅景走北陸高木交朔風衆情恱妖冶豈云恵其終萬事無不有流轉大化中古来論成敗咄咄魚為龍牛車竄下國勢異情則同蒲姚本狙擊桓桓湯武功彼美二三子一笑清酤空両虎闘中野利乃歸衡虞血肉相蹂躪鼓吹行通衢獨倚剛膂力箕踞傾百壺未必非禍福凡百持爾軀吾聞虎畏羆吹竹不枝梧光風蕩繁囿丹綠綴柔柯游子去萬里空閨歛翠蛾行雲落江水酒盡不成歌雞飛與狗走妾命獨奈何槁梧蒙􅌧冕峥嵘化侯王􅊡餌先百牢蘭烟浮玉房兒女何所見拜跪色甚荘四海正聾瞽威靈爾翕張哀哉杞梓材棄捐官道傍贈叚十相識風塵下斯文伯仲間騎驢逢聖日捫蝨對秋山忠信偏成拙支離最得閑秦川貴公子早計適荆蛮洛陽程自脩忘吾七首自修性孝友讀書城東門翰林元祐之上其言行除禮部郎中自修聞之弃家南去歸龍門来徃空書札行蔵但布衣直為知已用可惜轉頭非歲月百憂集江山一笑歸禰生狂到死君子要知機出城束帯供人事扶蔾強病身誅求非上意盗賊夲良民􅊜翠山蔵雨輕黄栁帯春小兒随白首行坐各霑巾獨坐終南在吾目秋色逺接應誰招天外翠来作牕中靚娟娟𥘉畫眉盈盈獨臨鏡雲去物象空月出心源印我欲徃從之有客誇㨗徑洗耳復洗耳松風入清聼痛哭日射石虬鱗甲開草色又換青春回精靈聚㪚豈拘束山鬼呌呼松栢哀當時沸天簫鼓動今日悲風陵上來匆匆今古成傳舎人生有情淚如把乾坤誤落腐儒手但遣空言當汗馬西晋風流絶可愁悵望千秋共瀟灑歳云暮矣歲云暮矣百工休獨持千古供索遊丈夫礌落如天日促促胡爲升斗謀望塵下拜乃東市山中茹芝可白頭嗚呼此道棄如土眼中厯厯聖賢蠧鄉里小児紇那歌前軰先生八風舞欲挽東流無萬牛抱膝長吟聼更雨送元吉歸河東獨憐風格困塵埃敢料天涯共酒盃花鳥偏扵前軰好江山更有後人哀顔回盗跖終歸命諸葛曹丕豈論才正自别離愁未透更敎柳色帯青來王猛墓男児有才須有識死塟蛮夷真可惜君不見渇虎不飲盗泉水始吾虞君今已矣瑯琊冉琇温季六首琇好縦横談業漁獵世爲李氏客難且作琇累書止之不聼乃南走渡江聞璮滅東鄊三哭伏劔蓬萊閣倚闌吟不就看劔老相催鳥逐孤雲沒帆從别國回魯連惟有死王粲不勝哀為問依依栁秋聲何䖏來遄臺㳺目遄臺上煙色秋曖曃當時駐文輿君臣良宴㑹歌鍾正喧喧華纓接飛盖行楽遽未央已見顔色改爽鳩焉可知齊景尚何在世運如日月朝夕還相代海州波濤起天末舟檝滿城隅管晏非王佐田韓有覇圖何門堪趿履吾道欲乗桴倚杖春風近含愁向緑蕪宿京口推蓬在京口山色對秋眠搔首半㠶落懐人孤月懸形骸成獨徃風物共流年随䖏逃名姓烏啼又發船秦吉了有鳥秦吉了鳴聲一何悲自言承主㤙十載供提携雕籠閉羽翼繫之㕠華緌一朝不終恵零落投荒夷自傷去漢土豈不懐南枝誠堪利主家生死不敢辭努力萬里風寄此長相思獨立獨立春将晚周㳺道正窮江山千古後形影百年中士論元無的人生各有終臨危負知已淚落海雲東河東元吉文中五首吉太原大侠人也報仇市上吏來捕更殺吏走太行谷中㑹以赦歸乃絶嘗與㳺者三年通左氏史記家益貧至元甲子從戍開平道卒上黨怒山出老掌拳寒色頑屭贔城根挿沙水斗絶虎相視惜憶昔宣武兵最疆合圍歩驟如搤吭那知一叱立破散進通亞子口尚黄嗚呼皇天肯悔禍豈有盗賊稱天王要留千古論曲直故壘依稀榆葉赤自葫蘆河至居庸関男児不成名命也負覊絏投𬒮出門去浩蕩破邊色飛沙白盪胞落葉黄沒膝微陽割層暝山骨緊格格抉眼已峥嵘置身何突兀徤鵰勢欲落老馬智亦屈氣岸勇枝梧脉絡大包括物候秋冬交土風夷夏隔懐歸畏簡書欲徃投鬼蜮無言答酸楚有血洒寥閴古来丧亂中天地坐跼蹐形骸盡則已烈士要馬革陪翟三㳺平州東城老境逢春色平州聚徳星不堪歌敕勒并欲案丁零雪泥殘年白山呈太古青殊方更分手暮角若為聼早發博州落落空城在蕭蕭獨客歸古今殊未了心迹毎相違魏國山河羙唐家節度非偷生慚宿鳥霜月上征衣夜坐森森夜氣落寒櫩閑把離騷酒正酣忽憶梅花不成語夢中風雪在江南曲阜孟鯁介甫四首鯁沈毅雄略中統癸亥山東兵欲𧺫刼鯁計事甲者三至鯁不肯遂𬒳害徐州徐州壓城霜木赭可能回首風塵下當年縞素從西來仰天伏地聲鳴啞君臣大義日月白牧野鳴條其亞帝王氣象佳葱葱舉止却類田舎翁美人瓊王是糞土四海正在水火中如龍如虎尚蹉跌况乃𥪡子貪天功南京愔愔坊陌傍深春活活河流雨過渾花鳥㡬時充貢賦牛羊今日上丘原猶傳柳七工詞翰不見朱三有子孫我亦前生梁楚士獨持心事過夷門猛虎猛虎𬒳束縛皮肉不相保人生到錯迕天地亦草草古來割㨿何代無可憐百萬殉匹夫漁陽突騎如風火青州城門鉄作樞丈夫好在識時務座上赤龍公莫舞沙海荒荒魂不歸莫説青州淚如雨折花怨匆匆杯酒又天涯晴日墙東呌賣花可惜仝生不仝死却随春色去誰家廣漢安如山汝止二首如山善擊劔左右射讀經史百氏之書端平甲午安撫曹友開辟掌書記不𧺫友聞戦死三泉如山徃収其骨藏諸其先之側乃東下老于㑹稽曹将軍将軍精悍姿齒齒碎鉄石在昔童稚中但聞飽經術縦横騁柔翰丹臒間金碧有司塞明詔敝邑屈詞伯芹香春水生冠玉侍重席脱略章句陋搜抉窮理窟未及文化成其如王土窄丈夫報主願豈必䝉清秩蒼然請去位滿靣秋栗烈紏合熊虎群旌斾揚廣陌正當摩厲間一鼓㧞勍敵屯兵沔水源千里斧截截浩蕩排煙旻西極安嵲屼柰何國無人腐儒秉旄鉞賞予入私門金湯授盗賊公時奮臂爭反邅獻玉刖三軍視馬首慟哭下下天壁功成坐齟齬憤怒鬚挿㦸中宵㧞劍𧺫肅肅整勁翮吐氣風雲生搴旗䧟堅列貫穿死生地喋血天地黒勢雖衆寡懸形未雌雄决路窮㫁首尾衆盡仍手格豈知龍虎逝黯淡山川色百萬尚震驚嗚呼死諸葛長城但自壊千古痛稠結肉食無逺謀野史有直筆酒酣歌節士皛皛霜月白下瞿唐去去如奔馬來來無盡船人心似江水日夜向呉天成都王翥一飛五首翥篤學尚氣呉曦謀反來請翥翥陽風病瘖潜徃安丙謀誅曦事定匿巴中為農終身送張判官歸巴州回首三巴曲平生萬里橋衣冠無頼客花月可憐宵灌口秋漲所向愁無地窮源欲上天蛟龍胡爾怒鷗鷺更誰憐萬里朝宗意群兇䟦扈年生涯秋色裡獨立問漁船呉宣撫故宅社稷疲奔命乾坤服至誠扶持三蜀在出入两朝榮豚犬有遺恨麒麟空復情家聲隤已盡國法用猶輕成季翻無後花卿浪得名門庭黄鳥語几杖綠苔生威福何偏重精神恐不平庶幾䝉世美凢百慎持盈憶舎弟藥物吾仍病花時汝未歸不眠愁月落獨立看雲飛詩禮自持律飢寒誰觧圍遥知理舟檝西望涕霑衣浮世浮世惟高抌平生有弊裘江花中酒日巴雨落㠶秋老矣英雄事愚㢤盗賊謀啼猿自在一笑下滄洲㐮陽師嚴道立嚴讀書識大義善槊射自圍中㧞身走行在所上書論事不報拂衣去客死武陵渡江鹿門山人滄浪客洒淚已枯眼見骨風塵峥嵘萬里空不知何䖏營三窟城中性命湯火近路窮援㫁無消息䑕竊狗偷何足憂都将十指謾天日大言濶歩好公卿三百年餘涵飬成已聞鄭五但搔首復近龎㳙𥪡子名平時肉食誇果决誰信臨危䟦疐行白頭面皱牙齒落萬事已矣秋風生大閱長江天設險荆州國門西幕前杖斧鉞赫赫齊晋尊熊羆在掌握百万下敢喧固列厓嶠立動色虹蜺翻雖云口口口亦是明主㤙髙秋皷角壮惨澹傷精魂山南正困戹血肉連川原由采多壘辱豈不在大藩既同事王室於義如弟晜朂哉從簡書䘏鄰古所敦藺五見訪漢隂美人青兕裘獨騎痩馬尋荒丘花前下馬迎一笑珠玉在側形骸羞酒酣㪚髪箕踞坐錦帯爛熳懸呉鈎㫁蛟刺虎好身手碧曈如水涵清秋惜哉科目太脱略壮士豈為章句囚中原格闘困不已江波木落寒悠悠庚午三月五日朱尚書席上醉歌天風浩蕩何䖏來荆南府中好春酒我公此日盛賓佐但飲母勞問升斗座中十萬無下筯烏㡌朱衣馬牛走妙舞清歌如有神翠爛金明各回首人生行楽須壮年小人再拜為主夀滿堂淚落𧺫挽鬚臨饋三難成鬰紆干戈未定郡國破亂臣賊子何代無主憂臣辱坐感激忍對花鳥調歡娱近聞士卒願一戦猛氣正倚風塵麄丈夫行事動千古快意一飽非雄圖武陵客居浩蕩千年調饑寒八尺身不愁􅑮魍魉可笑繫麒麟殘雪江村路空山澗水春時危終逺去道在豈全貧公安早發去國秦公子窮途阮歩兵别離如昨日豪侠異平生江月為誰好巴船何䖏行高秋伴揺落早發若為情廣陵張琰汝玉琰身七尺長鬛倜儻有莭㮣𥙷州牙兵隨制置李庭芝潰圍南赴行在所追者及之麾下鳥獸散琰獨闘死出塞曲腰間挿雄劍中夜龍虎吼平明登前途萬里不回首男兒當野死豈為印如斗忠誠表壮莭燦爛千古後朝發山陽去暮宿清水頭上馬左右射捷下如獼猴先發服勇决手提血髑髅兵家互勝負凡百慎前籌驅馬飲淮水千里黄草平種榖却流血痛哭秋風生寡妻出租稅孤兒荷戈行武威既不足願見和親成軍中日奏凱鼓行遼海東當宁怡玉色千金勞成功焉知昨日地組甲去如空邊人不敢語将軍益褒崇官栁不見橋東黄布帘樹猶如此我何堪裊裊亭亭忒無賴又将春色誤江南漢陽汪涯萬頃三首涯家貧事母孝宣橅賈似道請為客當作露布獻捷涯瞋目曰㗖人以利而退其師又児㺯主上似道大怒撾殺之其母曰汝以直死我則不辱可以下報先君矣亦自沈江帆江帆去去可腸㫁千古萬古越王臺掃空黄葉晚風定飛盡碧天晴鳥回半生無成坐筆硯萬事不理問樽罍年年㸔梅今白首已矣英雄留七哀采石獨酌欲落不落月在手百年幾何持釣綸不知春色萬象表緑煙漠漠入江薲天翻地覆有今夕酒熟詩温無可人向来談笑成黄土墮淚未了雞司晨江行江陵白魚如斫玉挂蓆獨去風日寒封題両甕寄白髪兒涯不是作魚官秋光蕩漾滿行色鄰舟吹笛不堪聞洞庭濯足一樽酒夫君不來空白雲
