body:
  text: 谷音卷上元杜本輯遼東王澮𤣥佐六首澮博學醇行博州刺史迎為師教授弟子百餘貞祐中就拜宣撫遼東宰相累書請澮之鎮澮不應浮海遯去河之坊河之坊矣截截其平豈曰不力言持其盈國􅀈覆矣視爾夢夢云胡昊天不終惠我生云胡昊天疾威堂堂輾轉翫日四國卒荒偃仰在位不知匪臧不顧其行有粟有粟亦集于缶則不敢饘抑糊余口誶曰哲矣孰秉其咎知我懮懮不知我疚陟彼南山石其扁矣戒爾勿傷足其趼矣􅊱􅊱㖧㖧顔之靦矣猗余何言涕之泫矣民之種種具曰贅疣弗於爾躬曷云能瘳勗哉夫子保爾有位慎爾為猶感遇迅景走北陸髙木交朔風衆情悦妖冶豈云惠其終萬事無不有流轉大化中古來論成敗咄咄魚為龍牛車竄下國勢異情則同浦姚本徂擊桓桓湯武功彼美二三子一笑清酤空又兩虎闘中野利乃歸衡虞血肉相蹂躪鼓吹行通衢獨倚剛膂力箕踞傾百壺未必非禍福凡百持爾軀吾聞虎畏羆吹竹不枝梧又光風蕩繁囿丹綠綴柔柯㳺子去萬里空閨歛翠蛾行雲落江水酒盡不成歌雞飛與狗走妾命獨奈何又槁梧䝉紱冕崢嶸化侯王􅊡餌先百牢蘭煙浮玉房兒女何所見拜跪色甚莊四海正聾瞽威靈爾翕張哀哉杞梓材棄捐官道傍贈段十相識風塵下斯文伯仲間騎驢逢聖日捫蝨對秋山忠信偏成拙支離㝡得閒秦川貴公子早計適荆蠻洛陽程自修忘吾七首自修性孝友讀書城東門翰林元裕之上其言行除禮部郎中自修聞之棄家南去歸龍門來往空書札行藏但布衣直為知已用可惜轉頭非嵗月百憂集江山一笑歸禰生狂到死君子要知幾出城束帶供人事扶藜強病身誅求非上意盜賊本良民濕翠山藏雨輕黄栁帶春小兒隨白首行坐各霑巾獨坐終南在吾目秋色逺接應誰招天外翠來作忩中靚娟娟初畫眉盈盈獨臨鏡雲去物象空月出心源瑩我欲往從之有客誇㨗徑洗耳復洗耳松風入清聽痛哭日射石虬鱗甲開草色又換青春回精靈聚散豈拘束山鬼呌呼松柏哀當時沸天簫鼓動今日悲風陵上來匆匆今古成傳舎人生有情淚如把乾坤誤落腐儒手但遣空言當汗馬西晉風流絶可愁悵望千秋共瀟灑嵗云莫矣嵗云莫矣百工休獨持千古供索逰丈夫礌落如天日促促胡為升斗謀望塵下拜乃東市山中茹芝可白頭嗚呼此道棄如土眼中厯厯聖賢蠧鄉里小兒紇那歌前輩先生八風舞欲挽東流無萬牛抱膝長吟聽更雨送元吉歸河東獨怜風格困塵埃敢料天涯共酒杯花鳥偏於前輩好江山更有後人哀顔回盜跖終歸命諸葛曹丕豈論才正自别離愁未透更教栁色帶青來王猛墓男兒有才須有識死塟蠻夷真可惜君不見渴虎不飲盜泉水始吾虞君今已矣瑯琊冉琇温季六首琇好縱横談業漁獵世為李氏客難且作琇累書止之不聽乃南走渡江聞璮滅東鄉三哭伏劍蓬萊閣倚闌吟不就看劍老相催鳥逐孤雲没帆從别國回魯連惟有死王粲不勝哀回問依依栁秋聲何處來遄臺㳺目遄臺上煙色秋曖曃當時駐文輿君臣良宴㑹歌鐘正喧喧華纓接飛盖行樂遽未央已見顔色改爽鳩焉可知齊景尚何在世運如日月朝夕還相代海州波濤起天末舟檝滿城隅管晏非王佐田韓有霸圖何門堪趿履吾道欲乘桴倚杖春風近含愁向綠蕪宿京口推篷在京口山色對秋眠搔首半帆落懷人孤月懸形骸成獨往風物共流年隨處逃名姓烏啼又發船秦吉了有鳥秦吉了鳴聲一何悲自言承主恩十載供提㩦雕籠閉羽翼繫之雙華絲一朝不終惠零落投荒夷自傷去漢土豈不懷南枝誠堪利主家生死不敢辭努力萬里風寄此長相思獨立獨立春將晚周㳺道正窮江山千古後形影百年中士論元無的人生各有終臨危負知已淚落海雲東河東元吉文中五首吉太原大俠也報讐市上吏求捕更殺吏走太行谷中㑹以赦歸乃絶甞與㳺者三年通左氏史記家益貧至元甲子從戍開平道卒上黨怒山出老拳寒色頑贔屭城根挿沙水斗絶虎相視憶昔宣武兵最強合圍步驟如搤吭那知一叱立破散誰道亞子口尚黄嗚呼皇天肯悔禍豈有盜賊稱天王要留千古論曲直故壘依稀榆葉赤自葫蘆河至居庸闗男兒不成名命也負羈絏投袂出門去浩蕩破邉色飛沙白盪胸落葉黄沒膝微陽割層暝山骨𦂳格格抉眼已崢嶸置身何突兀健鵰勢欲落老馬智亦屈氣岸勇枝梧脉絡大包括物候秋冬交土風夷夏隔懷歸畏簡書欲往投鬼蜮無言答酸楚有血灑寥閴古來喪亂中天地坐跼蹐形骸盡則已烈士裹馬革陪翟三㳺平州東城老境逢春色平州聚德星不堪歌敕勒并欲案丁零雪泥殘年白山呈太古青殊方更分手莫角若為聽早發博州落落空城在蕭蕭獨客歸古今殊未了心迹每相違魏國山河美唐家節度非偷生慙宿鳥霜月上征衣夜坐森森夜氣落寒櫩閒把離騷酒正酣忽憶梅花不成語夢中風雪在江南曲阜孟鯁介甫四首鯁沈毅雄畧中綂癸亥山東兵欲起劫鯁計事甲者三至鯁不肯遂被害徐州徐州壓城霜木赭可能回首風塵下當年縞素從西來仰天伏地聲嗚啞君臣大義日月白牧野鳴條此其亞帝王氣象佳葱葱舉止却類田舎翁美人瓊玉是糞土四海正在水火中如龍如虎尚蹉跌況乃豎子貪天功南京愔愔坊陌傍深春活活河流雨過渾花鳥幾時充貢賦牛羊今日上丘原猶傳栁七工詞翰不見朱三有子孫我亦前生梁楚士獨持心事過夷門猛虎猛虎被束縛皮肉不相保人生到錯迕天地亦草草古來割據何代無可憐百萬殉匹夫漁陽突騎如風火青州城門鐵作樞丈夫好在識時務座上赤龍公莫舞沙海荒荒魂不歸莫説青州淚如雨折花怨匆匆杯酒又天涯遲日墻東呌賣花可惜同生不同死却隨春色去誰家廣漢安如山汝止二首如山善擊劍左右射讀經史百氏之書端平甲午安撫曹友聞辟掌書記不起友聞戰死三泉如山往收其骨藏諸其先之側乃東下老于㑹稽曹將軍將軍精悍姿齒齒碎鐵石在昔童稚中但聞飽經術縱横騁柔翰丹雘間金碧有司塞明詔敝邑屈詞伯芹香春水生冠玉侍重席脱畧章句陋搜抉窮理窟未及文化成其如王土窄丈夫報主願豈必蒙清秩蒼然請去位滿面秋栗烈糾合熊虎羣旌斾揚廣陌正當摩厲間一鼓拔勍敵屯兵沔水源千里斧截截浩蕩排煙旻西極安屼嵲奈何國無人腐儒秉旄鉞賞予入私門金湯授盜賊公時奮臂爭反遭獻玉刖三軍視馬首痛哭下天壁功成坐齟齬憤怒鬚挿㦸中宵拔劍起肅肅整勁翮吐氣風雲生搴旗陷堅列貫穿死生地蹀血天地黒勢雖衆寡懸形未雌雄决路窮斷首尾衆盡乃手格豈知龍虎逝黯淡山川色百萬尚震驚嗚呼死諸葛長城但自壞千古痛稠結肉食無逺謀野史有直筆酒酣歌節士皛皛霜日白下瞿唐去去如奔馬來來無盡船人心似江水日夜向吳天成都王翥一飛五首翥篤學尚氣吳曦謀反來請翥翥陽病風瘖潛往安丙謀誅曦事定匿巴中為農終身送張判官歸巴州回首三巴曲平生萬里橋衣冠無賴客花月可憐宵灌口秋漲所向愁無地窮源欲上天蛟龍胡爾怒鷗鷺更誰怜萬里朝宗意羣兇跋扈年生涯秋色裏獨立問漁船吳宣撫故宅社稷疲奔命乾坤服至誠扶持三蜀在出入兩朝榮豚犬有遺恨麒麟空復情家聲隤已盡國法用猶輕成季翻無後花卿浪得名門庭黄鳥語几杖綠苔生威福何偏重精神恐不平庶幾蒙世美凡百慎持盈憶舎弟藥物吾仍病花時汝未歸不眠愁月落獨立看雲飛詩禮自持律飢寒誰解圍遙知理舟檝西望涕霑衣浮世浮世惟髙枕平生有敝裘江花中酒日巴雨落帆秋老矣英雄事愚哉盜賊謀啼猿長自在一笑下滄洲襄陽師嚴道立六首嚴讀書識大義善槊射自圍中拔身走行在所上書論事不報拂衣去客死武陵渡江塵門山人滄浪客灑淚已枯眼見骨風塵崢嶸萬里空不知何處營三窟城中性命湯火近路窮援斷無消息鼠竊狗偷何足憂都將十指漫天日大言濶步好公卿三百年餘涵養成已聞鄭五但搔首復道龎涓豎子名平時肉食誇果决誰信臨危跋㚄行白頭面皺牙齒落萬事巳矣秋風生大閱長江天設險荆州國西門幕前杖斧鉞赫赫齊晉尊熊羆在掌握百萬不敢喧固列厓嶠立動色虹蜺翻雖云上將猷亦是明主恩髙秋鼓角壯慘澹傷精魂山南正困戹血肉連川原由來多壘辱豈不在大藩既同事王室於義如弟晜勗哉從簡書卹鄰古所敦藺五見訪漢隂美人青兕裘獨騎痩馬尋荒丘花前下馬迎一笑珠玉在側形骸羞酒酣散髪箕踞坐錦帶爛熳懸吳鈎斷蛟刺虎好身手碧瞳如水涵清秋惜哉科目太脱畧壯士豈為章句囚中原格闘困不巳江波木落寒悠悠庚午三月五日朱尚書席上醉歌天風浩蕩何處來荆南府中好春酒我公此日盛賓佐但飲無勞問升斗座中十萬無下箸烏㡌朱衣馬牛走妙舞清歌如有神翠爛金明各回首人生行樂須壯年小人再拜為主夀滿堂淚落起挽鬚臨饋三歎成鬱紆干戈未定郡國破亂臣賊子何代無主憂臣辱坐感激忍對花鳥調歡娛近聞士卒願一戰猛氣正倚風塵麤丈夫行事動千古快意一飽非雄圖武陵客居浩蕩千年調飢寒八尺身不愁逢魍魎可笑繫麒麟殘雪江村路空山澗水春時違終逺去道在豈全貧公安早發去國秦公子窮途阮步兵别離如昨日豪俠異平生江月為誰好巴船何處行髙秋伴搖落早發若為情廣陵張琰汝玉五首琰身七尺長鬛倜儻有節槩補州牙兵隨制置李庭芝潰圍南赴行在所追者及之麾下鳥獸散琰獨鬭死出塞曲腰間挿雄劍中夜龍虎吼平明登前途萬里不回首男兒當野死豈為印如斗忠誠表壯節燦爛千古後又朝發山陽去莫宿清水頭上馬左右射㨗下如獼猴先發服勇決手提血髑髏兵家互勝負凡百慎前籌又驅馬飲淮水千里黄草平種谷却流血痛哭秋風生寡妻出租稅孤兒荷戈行武威既不足願見和親成又軍中日奏凱鼓行遼海東當宁怡玉色千金勞成功焉知昨日地袒甲去如空邉人不敢語將軍益褒崇官栁不見橋東黄布帘樹猶如此我何堪裊裊亭亭忒無賴又將春色誤江南漢陽汪涯萬頃四首涯家貧事母孝宣撫賈似道請為客當作露布獻㨗涯瞋目曰啗人以利而退其師又兒弄主上似道大怒撾殺之其母曰汝以直死我則不辱可以下報先君矣亦自沈江帆江帆去去可腸斷千古萬古越王臺埽空黄葉晚風定飛盡碧天晴鳥回半生無成坐筆硯萬事不理問樽罍年年看梅今白首已矣英雄留七哀采石獨酌欲落不落月在手百年幾何持釣綸不知春色萬象表綠煙漠漠入江濱天翻地覆有今夕酒熟詩温無可人向來談笑成黄土墮淚未了雞司晨江行江陵白魚如斫玉掛席獨去風日寒封題兩甕寄白髪兒涯不是作魚官又秋光蕩漾滿行色鄰舟吹􅅇不堪聞洞庭濯足一樽酒夫君不來空白雲
