body:
  text: 谷音跋右詩一巻凡二十三人無名者四人共一百首乃宋亡元初節士悲憤幽人清詠之辭京兆先生早遊江湖得於見聞悉能成誦因錄為一編題曰谷音若曰山谷之音野史之類也刋於平川懷友軒以傳於世今厯兵燹板己不存余幸藏此本風晨月夕寂寥之中每一歌之則想像其人而愧不能彷彿其萬一也未嘗不慨然久之今年先生之孫徳基來從余暇時輙出此編俾録而歸之曰是爾祖手訂之文且諸人小錄皆其自述言簡而備是亦家傳之舊子能誦而思之亦繼紹之一端未可以為小書而忽之也因嘗論之時危世變臨難不避與夫長往自潔者不為不少惜不盡傳於世也如此編數人茍非先生記其詩而傳之則泯没無聞矣然則誦其詩者非獨取其雄渾沖澹而其心術之正出處之大可槩見矣徳基其廣傳之毋為篋笥故紙云戊午重九日蜀郡張榘書谷音跋宋初閲杜伯原懐友軒記喜其孤往風標翛然雲上急覔本傳讀之累徴不赴隠㢘於武夷九曲間殆古之栖逸者流而以翰墨自放者也正謂其四經表義諸書湮没罕見扼腕久之月在從呉門來携得谷音二巻乃伯原所集宋末逸民詩也凡二十有九人各有小傳紀其大略共詩百篇諸體具備韓昌黎云其歌也有思其哭也有懐凡出乎口而為聲者其皆有弗平者乎宋室既傾詩品都靡獨數子者心懸萬里之外九霄之上或上書或浮海或仗劍沉淵悲歌慷慨令人讀其詩想其人有齊二客魯兩生之思焉不然紀逡唐林之節非不苦韋莊和凝之詩非不韻一失身於新莽偽屬之朝恐未免為後世嗤笑資于伯原斯編意有不得其平復有不忍鳴者聊借他人章句竊比靖節不書甲子之遺意歟湖南毛晉識
