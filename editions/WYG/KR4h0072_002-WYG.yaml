body:
  text: 谷音巻上欽定四庫全書谷音巻下元杜本輯建安詹本道生三首本温言正行丞相江萬里薦為郎先致書本本方坐門前石上釣使者至問本居本曰前即持竿渡溪去不知所終春日攜客游武夷山脚健枝梧百里挿蒼峭粼粼石可把曙色坐逺釣風水真笙竽厯落太古調衣冠帶莽蒼山鬼驚二妙雲月正忘年花鳥更索笑迴船翠凌亂吾道付長嘯閒中萬事問不知山中一樽酒埽石坐松風綠隂滿巾袖宿天台風泉隔西屋獨夜寒自生開忩失山色白雲壓前楹累盡得瀟灑去住俱不驚鼻息答僧鍾霜露入殘更四明皇甫明子東生三首明子性豪宕乘小舟掛布帆載琴尊書籍釣具往來江湖至元丙子發狂痛哭蹈海水國水國淒涼住秋宵爛熳眠歸雲猶帶雨墮月忽明船社稷資長算髭鬚近莫年亂離棲不定百口託浮田海口窮島迷孤青颶風盪頑寒不知是海口萬里空波瀾蛟龍恃幽沈怒氣雄屈蟠崢嶸抉秋隂挂席潮如山熒惑表南紀天去何時還雲旗光慘澹腰下青琅玕誰能居甬東一死諒非難嗚呼朝宗意㑹見桑土乾京口行京口兵可用酒可飲一語參差族成血忠賊相持各凛凛豈知好醜隔形骸父為孔鸞子為鴆人衆天定理則那遺臭流芳且髙枕長沙丁開復見四首開負氣敢言安撫向士璧被問開獨詣闕上疏具陳士璧功大軍府小費不宜推究書奏羈管揚州嵗餘卒可惜日者今何及天乎有不平功髙人共嫉事定我當烹父老俱嗚咽天王本聖明不愁罹黨禍攜涙向孤城漂泊岳陽遇張中行因汎舟洞庭晚宿君山聨句元氣無根株開地脈有斷絶中行日月互吞吐開雲霧自生滅中行楚妃結幽想開巴客答清吷中行寧知莽蒼中不假巨鼇力勢閲南紀浮開思隨西風發形影寄孤舟中行吾道成鴃舌笑談正凌傲開俯仰不偪側每與景物㑹中行未省歡娛畢疊翠晚愔愔開墮黄秋的的魚龍負贔屭中行獨鳥去不息曠原眇周抱開異境超慌惚徑度萬頃空中行忽得一拳碧稍稍雞犬近開依依鐘􅆊夕推門月微墮中行煮茗香初歇衣裳識霜信開瓶鉢了禪悦事定心源清中行夢回斗柄直周㳺興欲盡開長往計未決出門更回首中行沙水盪虚白美哉神禹功開巳矣三苗國山川長不朽中行愚智俱可惜神交正冥冥開指㸃空厯厯慎勿語俗人中行桃源恐相失開建業誰遣淒涼滿眼中蘋花渺渺又秋風龍蹲虎踞江山大馬去牛來社稷空縱有千人惟諾諾本無百嵗更匆匆乾坤顛倒孤舟在聊復殘生伴釣翁揚州嵗莫萬國春回日層城晚眺餘江聲隔吳楚原色到邳徐大閲軍容壯狂歌客禮疎百年寒荻裏風雨憶吾廬括蒼鮑輗以行四首輗嗜酒授簡萬言教授得錢悉送酒家遇客盡飲乃去晚益傲誕衲衣髽結㳺青城不返襄陽行今日何日春氣柔東城騎馬花綢繆為君停馬一呼酒花前倒披紫綺裘玉脂汎濫魚鳥飫歌舞倦矣蛾眉愁千金萬夀好賓主今我不樂嵗如流豈比世上狂馳子一語不合行掉頭嗚呼天倫古所定非有大故寧相尤天馬天馬抱奇相𦂳骨瞳方明出入百萬中有如一鳥輕宇宙莽超踏風雲慘經營獨倚雄傑態蕭蕭隨北征朝飲南海頭夕秣乃幽并失主坐黯淡别羣奮長鳴豈無輕俠兒金羈懸朱纓但感束帛義不忍負死生低頭為君老喑喑萬里情重到錢塘生死雙飛正可憐若為白髪上征船未應分手江南去更有春光七十年又無賴山光疊疊青玉魚金盌早飄零冷思禹穴真奇事千古衣冠託杳冥又萬家歌舞送浮生曾有涓埃答太平猿鶴蟲沙天始定不須辛苦怨南征又聞道深春雪打圍誰怜身上藕絲衣莫憂白璧成塵土解逐南風萬里歸又惟有寒潮不世情朝朝莫莫過空城百年車馬閶門外獨被春風草又生京口崔璆子玉三首璆美風儀善談論晚病狂攜大瓢貯酒行市拍掌歌笑未死十日自表石題曰醉鄉伯崔璆之墓攜戣鉞汎江酒星落京口化為崔子玉孤舟載壺觴水花紅暎肉小兒唱銅斗大兒倒􅙩醁一笑不知年浩蕩天地屋慎勿臨竇呼人生隨轉燭嗣宗禮法仇鍾㑹被殺戮咄咄咄咄復咄咄小兒成老翁么微各形色追琢元化工不知春風去又見千綠樷主人美客懷載酒行溪東一步一回首十步尊巳空靈均與太白醒醉同所終願見化蠛蠓生死託壺中今日一何好今日一何好花下醉狼籍醉中有奇事夢見生八翼浩蕩排虚空靈君好顔色朱衣持大篆授我醉鄉伯頓首玉墀下臣璆才蟣蝨封此抑何功請陳愚頑臆臣家京口東門前大江碧臣願駕長風吹作酒萬石萬象各千鍾拍拍大庭國推枕在山中紙衾霜曉月姑孰魚潛德昭五首潛敦重和易推分澹泊不忤於物所居環堵埽地焚香彈琴讀書養鵞鴨百頭以給食終八十餘楊白花楊白花誰教度簾幙搖蕩春風能幾何不比無情自漂泊人生祇合作支離長秋鵶啼江水落古意青青陵上柏落落勁不摧人生百年内朝夕變所懷斗酒命同好萬里不頋回聞有昌國君談笑黄金臺柔言更長跪信是富貴媒但恐氣習移古今不同才寄言去國者嵗晚有餘哀又權衡豈公平天駟但伏櫪東井不捄渇倉庫何時實元工肯假借名器甚可惜如何萬萬古不行督責術送鄭秘書南歸垂老乃如此憑髙俱惘然空能正幾字好去作千年童子歌鴝鵒幽人拜杜鵑江花獨爛熳春去得誰怜聞歌流雲行水出名姝酒盡花前雙玉壺此曲江南都忘却春風轉調小單于瑞陽柯芝士先芝早通五經善詞賦又詣行在所見章秘書求讀書省中益通諸家教授生徒著書百餘巻子茂謙餘髪餘髪蕭蕭白垂領十年守拙門庭冷來頻沙鳥頗相識起晚鄰雞巳三請形骸拄樹豈復好心緒如蓬不能整平生幾緉空馺􅤥老去一盃先酩酊俗言祇虞方鑿迕人事但愜幽居屏賦形不必盡芻狗處坎何堪共鼃黽若為苴履曽足芥幸不栁衫真欲癭一聲樵響何處來獨立看雲發深省耳耳耳耳非佳語陸陸難為顔我生胡不淑多戚長鮮歡搖落復巳綠春風滿江干最靈起予興欲言骨肉酸園桑摧為薪桃李亦半殘翹蕘企晴燠九室十更寒飛錢如美色乃入貴者闌丘閭有穀賣窮櫩朝無饘不售信蹙隠徒手良抱歎宛轉愒餘息溝壑分寸間吾輩正不免遑暇卹彼瘝横江横江一片碧攜鶴上漁船收綸不成下却抱釣竿眠柯茂謙退子江行早發陶鐺煮孤影寒燈沸青花氷開數江樹月落失人家魯港十年回首付霑襟斷甲沈沙齒齒深可惜使船如使馬不聞聲鼓但聲金人歌鬼哭都堪淚木落江空正獨吟遺老蕭條漸無語酒旗颭颭出蘆林廬陵邵定中立二首定温粹博雅通周易春秋宅邊植梅竹蘭桂蓮菊各十餘本深衣大帶婆娑其閒自稱六薌老人山中白日看雲坐清秋對雨眠眉頭無一事筆下有千年漁家漁家臨水住春盡無花開年年謝流水流得好花來豫章熊與龢天樂與龢性介澹無妻不食肉通經史百氏之書布衣草屨遨遊諸名山尤嗜彈琴草書唐𤣥宗鐵像巍冠攢疊碧雲花坐閲山中幾嵗華莫把金丹輕㸃化正愁生死困安家木平飼龍亭次韻方巨山耳見何如得眼聞山根磅礴極初分浮漚起滅自潭影大地晴隂空嶺雲何處老人來聽講他年少府有移文由來清調須吾輩幸不山王愧五君宜春晏乂明粲二首乂風度秀整主趙崇澭後澭逮繫乂自請詣獄俱以瘐死訪吳平生一語不肯吐浩然披髪行西林美人十日跨驢出黄葉堆門雲雪深夢中春樹年年少寒雲浦浦連片帆髙浪起斗酒夕陽偏沙市懷司馬州城哭老邊太平冠盖盡爾敢望諸賢大庾孫璉器之二首璉家貧益嗜書不應選舉躬耕織屨以食終百嵗述懷少也不諧俗老去益美閒百草生巳綠春雨滿南山朝朝荷鋤去既夕驅牛還生長茒簷下貧賤甚獨安但願桑麻長優㳺足嵗年又坐倦秋樹根攝衣步前丘横河澹如練破月西南流獨持一尊酒悠然發清謳俯仰無不足吾生焉所求臨江楊應登幼平二首應登寛厚長者有德行言辭七試國子不第退就耕牧老于南塘孫雯水宿水宿逢今雨春歸反故園聖朝臣巳老往事客何言乞米分隣里看書到子孫蒼茫不可㑹一笑了清樽寄趙梅州江城鴈呌天如水寒色蒼蒼草木死哀歌未斷月東出有才無命可流涕今我不樂思梅州束帶深衣百僚底天下規矩見卓絶龍章麟角諸公子白頭時節得蠻府歸來閉門呼不起惆悵平生狗馬病風后力牧長已矣為公問酒日日酤薰天富貴憂患始楊雯天章五首迢迢空同山迢迢空同山乃在西極巔玉泉䕃靈芝上有千嵗仙安得凌風翼相從白雲間神仙本冥漠天運仍推遷不如酌我酒或得成自然田父要我語飲者亦非賢願君長獨醒加餐足髙年宋武帝廟溪聲答松風巨石出老拳古樹不知名岌岌蛟龍纒夕隂互出沒秋華帶芳鮮葱葱帝王氣棟宇垂千年虎賁秉霜㦸慘澹生雲煙宫人翠龍駕手持玉連蜷昌明坐慌惚精神靁在天大呼司雍間旬月無秦燕昔為萬夫特今受衆目怜石馬亦埋沒嵗時草芊芊小臣異代士見之淚迸泉齊人思爽鳩蜀人哀杜䳌江東舊正朔禮奉敢不䖍但願君王心不忘載荻船下山又再拜白日當空懸客北客相催發一日舉千帆遙怜庾開府嵗晚望江南宿峽市人烟正搖落樓􅅇頗清圓老樹依山驛東風上峽船江湖萬里外燈火十年前世路能令老吾生且醉眠早春不知何處碧雲鄉冉冉平生可斷腸怪底乾坤惟理在老來嵗月更心長城頭急鼓千家夢江上殘梅一水香自作醉侯開醉國笑人奔走為誰狂旴江曾童子澈一首鮑輗過盱江遇一童子眉目疎朗語必援古今驚問逆旅主人子也明年載訪之死矣得其詩一首于其同舎生九齡行我生九齡氣食牛喑嗚頓挫無匹儔白雲無根起天末一身萬事同悠悠低頭拱手事先覺談笑未了成仇讐一譽不足勝百毁言語起滅如浮漚聖賢可與知者道麟鳳豈在山中遊蘧然夢覺大槐國江花昨夜生涼秋無名氏番陽布衣有書中山驛云回首萬里嵗晚何言云云番陽布衣題回頭四十五年非無賴秋光滿客衣可惜呉中蓴菜好陸機張翰不同歸瀟湘漁父崔璆晚泊湘江淡煙微月有客歌而過之追問居與名置其釣竿長嘯而去髙枕形骸外空江何限情落葉不成調半夜起秋聲古碑文掲大中云或漁于潭得片石字十數行率磨沒僅識得二十八字意幽人憤世之作不合於時故沈之以俟知者乾淳老人氣岳岳破冠穿履行帶索撑腸拄肚書萬巻臨風欲言牙齒落閩清野人僧惠了行閩清谷中三日到一空舎稍憇有一人荷鋤來便向壁熟睡僧既尋路還他日再往已焚其舎惟斫樹白而書云偶與雲水㑹不與雲水同雲散水流去杳然天地空羅浮狂客趙孟柔云柔録事惠州聞羅浮道士言咸淳中客有戴烏㡌著靴往來山中見人輒大笑反走三年不言姓名他日醉歸忽取煤書壁上云云長揖渡海去雲意不知滄海春光欲上翠微人間欲墮千劫猶探梅花未歸谷音巻下
