body:
  text: 建安詹本道生三首本温言正行丞相江萬里薦為􅀰先致書本夲方坐門前石上釣使者至問本居本曰前即持竿渡溪去不知所終春日携客㳺武夷山脚徤枝梧百里挿蒼峭􅉿􅉿石可把曙色坐逺釣風水真笙竽歴落太古調衣冠帯莽蒼山􅄦驚二妙雲月正忘年花鳥更索笑迴船翠􅇒亂吾道付長嘯閑中萬事問不知山中一樽酒掃石坐松風緑隂滿中䄂􅀫天台風泉隔西屋獨夜寒白生開窓失山色白雲壓前楹累盡得潇洒去住俱不驚鼻息答僧鐘霜露入殘更四明皇甫明子東生三首明子性豪宕乗小舟挂布帆載琴尊書籍釣具徃来江湖至元丙子􅀤狂痛􅂘蹈海水國水國凄凉住秋宵爛熳眠歸雲猶帯雨墮月忽明船社稷資長筭髭􅂡近暮年亂離栖不定百口托浮田海口窮島迷􅀌青􅄓風盪頑寒不知是海口萬里空波瀾蛟龍恃幽沉怒氣雄屈蟠峥嶸抉秋隂挂蓆潮如山熒惑表南紀天去何時還雲旗光惨澹腰下青琅玕誰􅀎居甬東一死諒非難嗚呼朝宗意㑹見桑土乾京口行京口兵可用酒可飲一語参差族成血忠賊相持各凛凛豈知好醜隔形骸父為孔鵉子為鴆人衆天定理則􅃚遺􅆨流芳且高枕長沙丁開復見四首開負氣敢言安撫向士璧􅀍問開獨詣􅇅上䟽具陳士璧功大軍府小費不宜推䆒書奏羈􅃹􅀭州􅀊餘卒可惜日者今何及天乎有不平功高人共嫉事定我當烹父老俱嗚咽天王夲聖明不愁惟黨祸携淚向􅀌城漂泊岳陽遇張中行因汎舟洞庭晚􅀫君山聮句元氣無根株丁地脉有㫁􅅸張日月互吞吐丁雲霧自生滅張楚妃結幽想丁巴客答青咉張寕知蒼莽中不假巨鼇力􅀔閲南紀浮丁思隨西風􅀤形影􅀉􅀌舟張吾道成鴃舌笑談正􅇒傲丁俯仰不偪側毎與景物㑹張未省􅂬娛畢疊翆晚愔愔丁墮黄秋的的魚龍負屭贔張獨鳥去不息曠原抱眇周抱丁異境超慌惚俓度萬頃空張忽得一拳碧稍稍雞犬近丁依依鐘梵夕推門月微墮張煮茗􅀄香歇衣裳識霜信丁瓶鉢了禅悦事定心源清張夢回斗柄植周游興欲盡丁長徃計未决出門更回首張沙水盪虚白美哉神禹功丁已矣三苗國山川長不朽張愚知俱可惜神交正􅁳􅁳丁指􅀧空歴歴慎勿語俗人張桃源恐相失丁建業誰遣凄凉滿眼中蘋花渺渺又秋風龍蹲虎踞江山大馬去牛來社稷空縦有千人惟諾諾本無百􅀊更匆匆乹坤顛倒􅀌舟在聊復殘生伴釣翁􅀭州􅀊暮萬國春囬日層城晚眺餘江聲隔呉楚原色到邳徐大閲軍容壮狂歌客禮踈百年寒荻􅂻風雨憶吾廬括蒼鮑輗以行七首輗嗜酒授簡萬言教授得錢悉送酒家遇客盡飲乃去晚益傲誕衲衣髽結游青城不返㐮陽行今日何日天氣柔東城􅀐馬花綢繆為君停馬一呼酒花前倒披紫綺裘玉脂汎濫魚鳥飫歌舞倦矣蛾眉愁千金萬夀好賔主今我不樂􅀊如流豈比世上狂馳子一語不合行掉頭嗚呼天倫古􅀁定非有大故寕相尤天馬天馬抱竒相􅂃􅇧瞳方明出入百萬中有如一鳥䡖宇宙莽超􅂿風雲惨經营獨􅀝雄傑態蕭蕭随北征朝飲南海頭夕秣乃幽并失主坐黯淡别群􅁬長鳴豈無䡖俠児金羈懸朱纓但感束帛義不忍負死生低頭為君老喑喑萬里情重到錢唐生死㕠飛正可憐若為白髪上征船未􅀿分手江南去更有春光七十年無頼山光疊疊清玉魚金盌早飄零冷思禹穴真竒事千古衣冠托杳􅁳萬家歌舞送浮生曽有㳙埃答太平猿鶴沙䖝天始定不須辛苦怨南征聞道深春雪打圍誰憐身上藕絲衣莫􅁨白璧成塵土觧逐南風萬里歸惟有寒潮不世情朝朝暮暮過空城百年車馬閶門外獨獨春風草又生京口崔璆子玉三首璆美風儀善談論晚病狂携大瓢貯酒行市拍掌歌笑未死十日自表石題曰酔郷伯崔璆之墓携戣􅃏汎江酒星落京口化為崔子玉􅀌舟載壺觴水花紅映肉小兒唱銅斗大兒倒􅙩醁一咲不知年浩蕩天地屋慎勿臨竇呼人生随轉燭嗣宗禮法􅄷鍾㑹􅀍殺戮咄咄咄咄復咄咄小児成老翁么微各形色追􅅣元化工不知春風去又見千緑叢主人美客懐載酒行溪東一歩一廻首十歩樽已空􅂕均與太白醒􅋨同􅀁終願見化蠛蠓生死托壺中今日一何好今日一何好花下􅋨狼藉􅋨中有竒事夢見生八翼浩蕩排虗空􅂕君好顔色朱衣持大􅂐授我􅋨卿伯頓首玉墀下臣璆才蟣蝨封此抑何功請陳愚頑臆臣家京口東門前大江碧臣願駕長風吹作酒萬石萬象各千鍾拍拍大庭國推枕在山中􅁓衾霜暁月姑熟魚潛徳昭五首潛敦重和易推分􅌿泊不忤扵物􅀁居環堵掃地㷊香弹琴讀書飬鵝鴨百頭以給食終八十餘楊白花楊白花誰教度􅄕幙揺蕩春風能㡬何不比無情自漂泊人生祗合作支􅄐長秋鵶啼江水落古意青青􅁜上柏落落劲不摧人生百年内朝夕変所懐斗酒命同好萬里不顧回聞有昌國君談笑黄金􅄗柔言更長跪信是富貴媒但恐氣習移古今不同才􅀉言去國者􅀊晚有餘哀􅁠衡豈公平天駟但伏􅇫東井不捄渇倉庫何時實元工肻假借名噐甚可惜如何萬萬古不行督責術送鄭秘書南歸垂老乃如此􅑀髙俱惘然空􅀎正㡬字好去作千年童子歌鴝鵒幽人拜杜䳌江南獨爛熳春去得誰憐聞歌流雲行水出名姝酒盡花前㕠玉壺此曲江南都忘却春風轉調小單于瑞陽柯芝士先三首芝早通五經善詞賦又詣行在􅀁見章秘書求讀書省中益通諸家敎授生徒著書百餘卷子茂謙餘􅄠餘􅄠蕭蕭白垂領十年一拙門庭冷来頻沙鳥頗相識􅁸晚憐鷄已三請形骸拄􅀣豈復好心緒如􅅫不􅀎整平生㡬緉空馺􅤥老去一杯先酩酊俗言祗虞方鑿迕人事但惬幽居屏聖賢未必盡芻狗天地何堪共鼃黽若為苴􅂂曾足芥幸不柳衫真欲癭一聲樵響何處来獨立看雲􅀤深省耳耳耳耳非佳語陸陸難為顔我生胡不淑多戚長鮮􅂬揺落復已綠春風滿清干最􅂕起予興欲言骨肉酸園桒摧為薪桃李亦半殘翹嶤企晴燠九室十更寒飛錢如美色乃入貴者闌丘閭有􅂖賣窮櫩朝無饘不售信蹙􅀮徒手良抱歎宛轉愒餘息溝壑分寸間吾軰正不免遑暇卹彼􅘃横江横江一片碧携隺上漁􅂳􅀵綸不成下却抱釣竿眠茂謙退子二首江行早􅀤陶鐺煮􅀌影寒燈沸青花氷開数江􅀣月落失人家魯港十年回首付霑􅁭㫁甲沉沙齒齒深可惜使􅂳如使馬不聞聲鼓但聲金人􅁔􅀑哭都堪史木落江空正獨吟遺老蕭條漸無語酒旗颭颭出蘆林廬􅁜卲定中立二首定温粹博雅通周易春秋宅􅁁植梅竹蘭桂蓮菊各十餘夲深衣大帯婆娑其間自􅁛六薌老人山中白日㸔雲坐清秋對雨眠眉頭無一事筆下有千年漁家漁家臨水住春盡無花開年年謝流水流得好花来豫章㷱與龢天楽二首與龢性介澹無妻不食肉通􅀴史百事之書布衣艸􅋰遨逰名山尤嗜弹琴草書唐􅀇宗鐵像巍冠攅疊碧雲花坐閱山中幾􅀊華莫把金丹䡖􅀧化正愁生死困安家木平飼龍亭次韻方巨山耳見何如得眼聞山根磅礴極􅀄分浮漚􅁸㓕自潭影大地晴隂空嶺雲何䖏老人來聼講他年少府有移文由來清調須吾軰幸不山王愧五君宜春宴乂明粲二首乂明風度秀整主趙崇澭後澭逮繫乂明自請詣獄俱以疾終訪呉平生一語不肯吐浩然披髪行西休美人十日跨驢岀黄葉堆門雲雪􅀷夢中春􅀣年年少寒雲浦浦連片㠶高浪􅁸斗酒夕陽偏沙市懐司馬州城哭老邉太平冠盖盡尔敢望諸賢大􅁃孫璉器之二首璉家貧益嗜書不􅀿選舉躬耕織屨以食終百歲述懐少也不諧俗老去益美間百草生已緑春雨滿南山朝朝荷鋤去既夕驅牛還生長􅈋簷下貧賤甚獨安但願桒麻長􅄖㳺足􅀊年坐倦秋􅀣根攝衣歩前丘横河淡如練破月西南流獨持一尊酒悠然􅀤清謳俯仰無不足吾生焉􅀁求臨江楊應􅀤㓜平二首􅀿􅀤寛厚長者有徳行言辭七試國子不第退就耕牧老于南塘孫雯水􅀫水􅀫逄今雨春歸及故園聖朝臣已老徃事客何言乞米分隣里看書到子孫蒼茫不可㑹一􅀏了清樽􅀉趙梅州江城鴈呌天如水寒色蒼蒼草木死哀􅁔未㫁月東出有才無命可流涕今我不楽思梅州束帯深衣百僚底天下規矩見卓絶龍章麟角諸公子白頭持莭得蛮府歸來閉門呼不􅁸惆悵平生狗馬病風后力牧長已矣為公問酒日日酤熏天富貴􅁨患始雯天章五首迢遥空同山迢迢空同山乃在西極巔玉泉䕃􅂕芝上有千􅀊仙安得􅇒風翼相􅀙白雲間神仙本􅄀漠天運仍推遷不如酌我酒或得成自然田父要我語飲者亦非賢願君長獨醒加餐足高年宋武帝廟溪聲答松風巨石出老拳古􅀣不知名岌岌蛟龍􅆞夕隂互出沒秋華帯芳鮮葱葱帝王氣棟宇垂千年虎賁秉霜㦸􅆭澹生雲煙宫人翠龍駕手持玉連蜷昌明坐慌惚精神靁在天大呼司雍間旬月無秦燕昔為萬大特今受衆目憐石馬亦埋􅃿􅀊時草芊芊小臣異代士見之淚迸泉齊人思爽鳩蜀人哀杜鵑江東舊正朔禮奉敢不䖍但􅂅君王心不􅁯載荻􅂳下山又􅂯拜白日當空懸􅀫峽市人煙正揺落楼笛頗清圓老􅀣依山驛東風上峡􅂳江湖萬里外燈火十年前世路能令老吾生且􅋨眠北客北客相催􅀤一日舉千帆遥憐􅁃開府􅀊晚望江南早春不知何䖏碧雲郷冉冉平生可㫁膓恠底乾坤惟理在老來歲月更心長城頭急鼓千家夢江上殘梅一水香自作􅋨􅀱開􅋨國􅀏人奔走為誰狂旴江曽童子澈一首鮑輗􅂈旴江遇一童子睂目踈朗語必援古今驚問逆旅主人子也明年載訪之死矣得其詩一首于其同舎生九齡行我生九齡氣食牛喑嗚頓挫無匹儔白雲無根􅁸天末一身萬事同悠悠低頭拱手事先覺談笑未了成仇讎一譽不足勝百毁言語起滅如浮漚聖賢可與知者道麟鳯豈在山中遊蘧然夢覺大槐國江花昨夜生凉秋無名氏番陽布衣有書中山驛云回首萬里􅀊晚何言云云番陽布衣題回頭四十五年非無賴秋光滿客衣可惜呉中􅐜菜好陸機張翰不同歸瀟湘漁父一首崔璆晚泊湘江淡烟微月有客歌而過之追問居與名置其釣竿長嘯而去高枕形骸外空江何限情落葉不成調半夜􅁸秋聲古碑文一首掲大中云或漁于潭得片石字十数行率磨沒僅識得二十八字意幽人憤士之作不合于時故沉之以俟知者乾淳老人氣岳岳破冠穿􅂂行帯索撑腸拄肚書萬卷臨風欲言牙齒落閩清野人一首僧恵了行閩清谷中三日到一空舎稍憇有一人荷鋤來便向壁􅌻睡僧既尋路還它日􅂯徃已㷊其舎惟斫􅀣白而書云偶與雲水㑹不與雲水同雲㪚水流去杳然天地空羅浮狂客趙孟柔云柔録事惠州聞羅浮道士言咸淳中客有戴烏㡌着靴徃來山中見人輙大笑反走三年不言姓名它日􅋨歸忽取煤書壁上云云長揖度海去雲意不知滄海春光欲上翠微人間一墮千刼猶爱梅花未歸谷音下終
